<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Do while </title>
</head>
<body>
    <h1> Do while </h1>

    <script>
let correctPin = 1234;

do {
  let enteredPin = +prompt("Enter your PIN:");
} while (enteredPin !== correctPin);

alert("✅ Access Granted");

    </script>
</body>
</html>
