<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> character of a string: </title>
</head>
<body>
    
    <h1> character of a string: </h1>



    <script>
let str = "JavaScript";

// Iterate through each character
for (let char of str) {
  console.log(char);
}


for (let i = 0; i < str.length; i++) {
  console.log(str[i]);
}

str.split('').forEach(char => console.log(char));

    </script>
</body>
</html>
