<!DOCTYPE html>
<html lang="en">
<head>

    <title>  Emoji Repeater </title>
</head>
<body>
    <H1>  Emoji Repeater </H1>


    <SCript>
        // Simulating user input
let emoji = "😊"; 
let count = 5;

// The easy way
console.log(emoji.repeat(count));

// The loop way (if you want to practice logic)
let result = "";
for (let i = 0; i < count; i++) {
    result += emoji;
}
console.log(result);
    </SCript>


</body>
