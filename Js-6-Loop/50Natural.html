<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> First 50 Natural Numbers </title>
</head>
<body>
     <h1> First 50 Natural Numbers </h1>
    
     <script>
        let totalSum = 0;

// Loop from 1 to 50
for (let i = 1; i <= 50; i++) {
    totalSum += i; // Adds the current value of i to totalSum
}

console.log("The sum of the first 50 natural numbers is:", totalSum);
// 1275

     </script>
</body>
</html>
