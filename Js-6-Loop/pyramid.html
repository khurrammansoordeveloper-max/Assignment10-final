<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Pyranid Loops  </title>
</head>
<body>
    <h1>Pyramid Loops</h1>



    <script>
        let rows = 5;

for (let i = 1; i <= rows; i++) {
    // Prints the "*" character 'i' times
    console.log("*".repeat(i));
}


let rows1 = 5;

for (let i = 1; i <= rows1; i++) {
    let rowContent = "";
    
    // Inner loop: adds stars based on the current row number (i)
    for (let j = 1; j <= i; j++) {
        rowContent += "*";
    }
    
    console.log(rowContent);
}

    </script>
</body>
</html>
