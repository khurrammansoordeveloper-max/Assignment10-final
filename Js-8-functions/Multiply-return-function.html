<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Multiply Return Function </title>
</head>
<body>
    <h1>JavaScript Functions</h1>
<h2>The return Statement</h2>
<p>A function that returns computed value:</p>

<p id="demo"></p>

<script>
function multiply (a , b ) {
    return a * b;

}
let total = multiply(2 , 3) * 10;
document.getElementById('demo').innerHTML = 
" The total is " + total;

</script>

</body>
</html>
